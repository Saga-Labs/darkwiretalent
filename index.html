<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Darkwire Talent</title>
<meta name="description" content="Darkwire Talent — creator representation and brand partnerships." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#f4f1ec;
    --muted:rgba(244,241,236,.66);
    --accent:#ff4a1c;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:#0b0a09;
    color:var(--ink);
    font-family:'Archivo',Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none}

  .stage{position:relative;min-height:100vh;width:100%;
    display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}

  /* rotating background layers (subject sits on the right); crossfade between 4 */
  .photo{position:absolute;inset:0;background-position:center right;background-size:cover;background-repeat:no-repeat;
    z-index:0;opacity:0;transition:opacity 1.6s ease}
  .p1{background-image:url('./bg1.jpg')}
  .p2{background-image:url('./bg2.jpg')}
  .p3{background-image:url('./bg3.jpg')}
  .p4{background-image:url('./bg4.jpg')}

  /* legibility veil: darker on the left where the type sits, plus a soft base at the bottom */
  .overlay{position:absolute;inset:0;z-index:2;pointer-events:none;
    background:
      linear-gradient(105deg, rgba(8,6,4,.66) 0%, rgba(8,6,4,.36) 34%, rgba(8,6,4,0) 60%),
      linear-gradient(0deg, rgba(8,6,4,.5) 0%, rgba(8,6,4,0) 24%);}

  .top{position:relative;z-index:3;display:flex;justify-content:space-between;align-items:center;
    padding:26px 34px;font-family:'Space Mono',monospace;font-size:12.5px;letter-spacing:.12em;text-transform:uppercase}
  .top .mark{display:flex;align-items:center;gap:9px;font-weight:700}
  .top .mark .dot{width:8px;height:8px;background:var(--accent);border-radius:50%}
  .top a:hover{color:var(--accent)}

  .hero{position:relative;z-index:3;padding:14px 34px 0;align-self:start}
  .labels{display:flex;gap:46px;flex-wrap:wrap;font-family:'Space Mono',monospace;
    font-size:12.5px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px}
  .labels span{max-width:15ch;line-height:1.35;color:var(--ink)}
  .labels span b{color:var(--accent);font-weight:700;display:block;margin-bottom:2px}
  h1{font-weight:900;text-transform:uppercase;font-size:clamp(64px,18vw,230px);
    line-height:.84;letter-spacing:-.02em;text-shadow:0 2px 40px rgba(0,0,0,.35)}
  .tagline{margin-top:22px;max-width:32ch;font-size:clamp(15px,2vw,19px);font-weight:500;line-height:1.45;color:var(--ink)}

  .foot{position:relative;z-index:3;display:flex;justify-content:space-between;align-items:flex-end;
    padding:0 34px 30px;flex-wrap:wrap;gap:14px}
  .contact .k{font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  /* email styled like the hero title: Archivo 900, tight */
  .contact a{font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(24px,4.2vw,46px);
    letter-spacing:-.02em;line-height:1;border-bottom:2px solid transparent;transition:.2s}
  .contact a:hover{border-color:var(--accent);color:var(--accent)}
  .glyph{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

  @media(max-width:640px){
    .labels{gap:22px}
    .top,.hero,.foot{padding-left:20px;padding-right:20px}
    h1{font-size:clamp(34px,13.5vw,80px);letter-spacing:-.03em}
    .contact a{font-size:clamp(20px,7vw,34px)}
  }
  @media(max-width:360px){
    h1{font-size:12.8vw}
  }
</style>
<script>function initApollo(){var n=Math.random().toString(36).substring(7),o=document.createElement("script");
o.src="https://assets.apollo.io/micro/website-tracker/tracker.iife.js?nocache="+n,o.async=!0,o.defer=!0,
o.onload=function(){window.trackingFunctions.onLoad({appId:"6a2ba18811e4da000c5f9fbb"})},
document.head.appendChild(o)}initApollo();</script>
</head>
<body>
  <div class="stage">
    <div class="photo p1"></div>
    <div class="photo p2"></div>
    <div class="photo p3"></div>
    <div class="photo p4"></div>
    <div class="overlay"></div>

    <header class="top">
      <div class="mark"><span class="dot"></span>Darkwire&nbsp;Talent</div>
      <a href="#contact">Contact</a>
    </header>

    <main class="hero">
      <div class="labels">
        <span><b>01</b>Creator Representation</span>
        <span><b>02</b>Brand Partnerships</span>
        <span><b>03</b>Global Roster</span>
      </div>
      <h1>Darkwire</h1>
      <p class="tagline">A talent agency representing the people shaping what comes next, and the brands that move with them.</p>
    </main>

    <footer class="foot" id="contact">
      <div class="contact">
        <div class="k">Partnerships &amp; Representation</div>
        <a href="mailto:hello@darkwiretalent.com">hello@darkwiretalent.com</a>
      </div>
      <div class="glyph">Est. 2026</div>
    </footer>
  </div>

  <script>
    (function(){
      var photos = Array.prototype.slice.call(document.querySelectorAll('.photo'));
      var i = 0;
      if (photos.length) photos[0].style.opacity = 1;
      setInterval(function(){
        var n = (i + 1) % photos.length;
        photos[i].style.opacity = 0;
        photos[n].style.opacity = 1;
        i = n;
      }, 7000);
    })();
  </script>
</body>
</html>
